<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Informatique Junior</title>
  <style>
    :root {
      --violet-1: #f3e8ff;
      --violet-2: #d8b4fe;
      --violet-3: #a855f7;
      --violet-4: #7e22ce;
      --rose: #f472b6;
      --jaune: #fde047;
      --bleu: #60a5fa;
      --fond: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 40%, #ddd6fe 100%);
      --texte: #3b0764;
      --carte: rgba(255, 255, 255, 0.82);
      --bordure: rgba(126, 34, 206, 0.2);
      --ok: #16a34a;
      --ko: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
      color: var(--texte);
      background: var(--fond);
      overflow-x: hidden;
    }

    .bg-shape {
      position: fixed;
      border-radius: 999px;
      filter: blur(1px);
      opacity: 0.35;
      z-index: -1;
      animation: float 8s ease-in-out infinite;
    }

    .shape-1 { width: 220px; height: 220px; background: var(--rose); top: -50px; left: -40px; }
    .shape-2 { width: 280px; height: 280px; background: var(--bleu); bottom: -70px; right: -60px; animation-delay: 1.2s; }
    .shape-3 { width: 170px; height: 170px; background: var(--jaune); top: 30%; right: 8%; animation-delay: 2.1s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }

    .title {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 20px;
      animation: popin 0.7s ease;
    }

    .title h1 {
      margin: 0;
      color: var(--violet-4);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      text-shadow: 1px 2px 0 #ffffff;
    }

    .title p {
      margin: 8px 0 0;
      font-size: 1.05rem;
    }

    @keyframes popin {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .card {
      background: var(--carte);
      border: 2px solid var(--bordure);
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(91, 33, 182, 0.15);
      padding: 18px;
      margin-bottom: 16px;
      backdrop-filter: blur(4px);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    label {
      font-weight: 700;
      color: var(--violet-4);
    }

    input[type="text"] {
      border: 2px solid #c084fc;
      border-radius: 999px;
      padding: 10px 14px;
      min-width: 220px;
      font-size: 1rem;
      outline: none;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .btn-main { background: #9333ea; color: #fff; }
    .btn-alt { background: #e9d5ff; color: #5b21b6; border: 1px solid #c084fc; }
    .btn-ok { background: #22c55e; color: #fff; }
    .btn-ko { background: #fb7185; color: #fff; }
    .btn-next { background: #7c3aed; color: #fff; }

    .hidden { display: none; }

    .top-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      background: #ede9fe;
      border-radius: 999px;
      padding: 8px 12px;
      text-align: center;
      font-weight: 700;
      color: #5b21b6;
    }

    .question-title {
      font-size: 1.2rem;
      color: #4c1d95;
      margin: 0 0 10px;
    }

    .question-box {
      background: #f5f3ff;
      border: 2px dashed #c084fc;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      min-height: 72px;
    }

    .answer-box {
      background: #faf5ff;
      border-left: 6px solid #a855f7;
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .score-anim {
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .result {
      text-align: center;
      padding: 20px 16px;
    }

    .star {
      font-size: 4.5rem;
      color: var(--jaune);
      text-shadow: 0 0 12px rgba(250, 204, 21, 0.8);
      animation: twinkle 1s ease-in-out infinite alternate;
      line-height: 1;
    }

    @keyframes twinkle {
      from { transform: scale(1) rotate(-4deg); }
      to { transform: scale(1.12) rotate(4deg); }
    }

    .leaderboard li {
      margin-bottom: 6px;
      background: #f5f3ff;
      border-radius: 10px;
      padding: 7px 10px;
      list-style: none;
    }

    @media (max-width: 640px) {
      .container { padding: 14px; }
      .card { padding: 14px; }
      input[type="text"] { width: 100%; min-width: 0; }
      .row > button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <main class="container">
    <header class="title">
      <h1>Quiz Informatique Junior</h1>
      <p>100 questions amusantes pour apprendre l'informatique (CP a CM2).</p>
    </header>

    <section id="startCard" class="card">
      <div class="row">
        <label for="playerName">Ton prenom :</label>
        <input id="playerName" type="text" placeholder="Ex: Lina">
        <button id="startBtn" class="btn-main">Commencer le quiz</button>
      </div>
      <p>Aucun chrono: tu peux reflechir et meme chercher sur le web avant d'afficher la reponse.</p>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="top-info">
        <div class="pill" id="progressText">Question 1 / 100</div>
        <div class="pill" id="levelText">Niveau</div>
        <div class="pill" id="scoreText">Score: 0 / 100</div>
      </div>

      <h2 class="question-title" id="themeText"></h2>
      <div class="question-box" id="questionText"></div>

      <div class="row">
        <button id="webBtn" class="btn-alt">Chercher sur le web</button>
        <button id="showAnswerBtn" class="btn-main">Afficher la reponse</button>
      </div>

      <div id="answerWrap" class="answer-box hidden">
        <p><strong>Reponse:</strong> <span id="answerText"></span></p>
        <p><strong>Explication:</strong> <span id="explainText"></span></p>
      </div>

      <div id="scoreButtons" class="row hidden">
        <button id="goodBtn" class="btn-ok">J'ai trouve (+1)</button>
        <button id="badBtn" class="btn-ko">Je me suis trompe</button>
      </div>

      <div class="row" style="margin-top: 10px;">
        <button id="nextBtn" class="btn-next" disabled>Question suivante</button>
      </div>
    </section>

    <section id="resultCard" class="card result hidden">
      <div class="star">★</div>
      <h2 id="finalTitle">Bravo !</h2>
      <p id="finalScore"></p>
      <p id="winnerText"></p>
      <button id="restartBtn" class="btn-main">Rejouer</button>
    </section>

    <section id="leaderboardCard" class="card hidden">
      <h3>Classement local (meilleurs scores)</h3>
      <ul id="leaderboardList" class="leaderboard"></ul>
    </section>
  </main>

  <script>
    const questions = [

      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Comment allume-t-on un ordinateur ?", reponse: "En appuyant sur le bouton d'alimentation.", explication: "Le systeme demarre, comme quand on allume une lampe.", search: "comment allumer un ordinateur" },

      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "A quoi sert le clavier ?", reponse: "A taper des lettres et des chiffres.", explication: "Chaque touche ecrit un caractere.", search: "clavier ordinateur pour enfant" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "A quoi sert la souris ?", reponse: "A deplacer le curseur et cliquer.", explication: "Elle aide a choisir des choses a l'ecran.", search: "souris informatique enfant" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Qu'est-ce qu'un clic ?", reponse: "Appuyer une fois sur la souris.", explication: "Un clic sert souvent a selectionner.", search: "c est quoi un clic" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Qu'est-ce qu'un double-clic ?", reponse: "Cliquer deux fois rapidement.", explication: "Souvent, cela ouvre un fichier ou une application.", search: "double clic definition" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Qu'est-ce qu'un ordinateur portable ?", reponse: "Un ordinateur qu'on peut transporter.", explication: "Il fonctionne avec une batterie.", search: "ordinateur portable enfant" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Qu'est-ce qu'une tablette ?", reponse: "Un petit ordinateur tactile.", explication: "On l'utilise avec les doigts.", search: "tablette tactile definition" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Qu'est-ce qu'un casque audio ?", reponse: "Un objet pour ecouter le son.", explication: "Il envoie le son dans tes oreilles.", search: "casque audio ordinateur" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Qu'est-ce qu'une webcam ?", reponse: "Une camera pour filmer sur l'ordinateur.", explication: "Elle sert pour les appels video.", search: "webcam c est quoi" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Qu'est-ce qu'une imprimante ?", reponse: "Une machine qui imprime sur papier.", explication: "Elle transforme un fichier numerique en feuille.", search: "imprimante definition enfant" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Pourquoi eteindre correctement l'ordinateur ?", reponse: "Pour proteger les fichiers.", explication: "Sinon, on peut perdre des donnees.", search: "eteindre ordinateur correctement" },
      { level: "CP / CE1", theme: "Bases de l'ordinateur", question: "Que montre le curseur a l'ecran ?", reponse: "Ou la souris pointe.", explication: "C'est comme un petit doigt qui montre.", search: "curseur souris ecran" },
      { level: "CP / CE1", theme: "Fichiers et dossiers", question: "Qu'est-ce qu'un fichier ?", reponse: "Un document dans l'ordinateur.", explication: "Ca peut etre une image, un texte ou une video.", search: "fichier informatique definition" },

      { level: "CP / CE1", theme: "Fichiers et dossiers", question: "Qu'est-ce qu'un document texte ?", reponse: "Un fichier pour ecrire.", explication: "Par exemple une histoire ou une lettre.", search: "document texte definition" },

    ].slice(0, 100);

    if (questions.length !== 100) {
      console.error("Le quiz doit contenir exactement 100 questions.");
    }

    const startCard = document.getElementById("startCard");
    const quizCard = document.getElementById("quizCard");
    const resultCard = document.getElementById("resultCard");
    const leaderboardCard = document.getElementById("leaderboardCard");

    const playerNameInput = document.getElementById("playerName");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");

    const progressText = document.getElementById("progressText");
    const levelText = document.getElementById("levelText");
    const scoreText = document.getElementById("scoreText");
    const themeText = document.getElementById("themeText");
    const questionText = document.getElementById("questionText");

    const webBtn = document.getElementById("webBtn");
    const showAnswerBtn = document.getElementById("showAnswerBtn");
    const answerWrap = document.getElementById("answerWrap");
    const answerText = document.getElementById("answerText");
    const explainText = document.getElementById("explainText");

    const scoreButtons = document.getElementById("scoreButtons");
    const goodBtn = document.getElementById("goodBtn");
    const badBtn = document.getElementById("badBtn");
    const nextBtn = document.getElementById("nextBtn");

    const finalTitle = document.getElementById("finalTitle");
    const finalScore = document.getElementById("finalScore");
    const winnerText = document.getElementById("winnerText");
    const leaderboardList = document.getElementById("leaderboardList");

    let playerName = "Joueur";
    let currentIndex = 0;
    let score = 0;
    let answeredCurrent = false;

    function saveScore(name, value) {
      const key = "quiz-informatique-scores";
      const list = JSON.parse(localStorage.getItem(key) || "[]");
      list.push({ name, score: value, date: new Date().toISOString().slice(0, 10) });
      list.sort((a, b) => b.score - a.score);
      localStorage.setItem(key, JSON.stringify(list.slice(0, 10)));
    }

    function getScores() {
      return JSON.parse(localStorage.getItem("quiz-informatique-scores") || "[]");
    }

    function renderLeaderboard() {
      const scores = getScores();
      leaderboardList.innerHTML = "";
      if (!scores.length) {
        leaderboardList.innerHTML = "<li>Aucun score pour le moment.</li>";
        return;
      }
      scores.slice(0, 5).forEach((item, idx) => {
        const li = document.createElement("li");
        li.textContent = `${idx + 1}. ${item.name} - ${item.score}/100 (${item.date})`;
        leaderboardList.appendChild(li);
      });
    }

    function updateHeader() {
      progressText.textContent = `Question ${currentIndex + 1} / 100`;
      levelText.textContent = questions[currentIndex].level;
      scoreText.textContent = `Score: ${score} / 100`;
      scoreText.classList.remove("score-anim");
      void scoreText.offsetWidth;
      scoreText.classList.add("score-anim");
    }

    function showQuestion() {
      const q = questions[currentIndex];
      themeText.textContent = `Theme: ${q.theme}`;
      questionText.textContent = q.question;
      answerText.textContent = q.reponse;
      explainText.textContent = q.explication;
      answerWrap.classList.add("hidden");
      scoreButtons.classList.add("hidden");
      nextBtn.disabled = true;
      answeredCurrent = false;
      updateHeader();
    }

    function startQuiz() {
      playerName = (playerNameInput.value || "Joueur").trim();
      currentIndex = 0;
      score = 0;
      answeredCurrent = false;

      startCard.classList.add("hidden");
      resultCard.classList.add("hidden");
      quizCard.classList.remove("hidden");
      leaderboardCard.classList.remove("hidden");

      showQuestion();
      renderLeaderboard();
    }

    function markAnswer(isGood) {
      if (answeredCurrent) return;
      answeredCurrent = true;
      if (isGood) score += 1;
      updateHeader();
      nextBtn.disabled = false;
      goodBtn.disabled = true;
      badBtn.disabled = true;
    }

    function nextQuestion() {
      if (currentIndex < questions.length - 1) {
        currentIndex += 1;
        goodBtn.disabled = false;
        badBtn.disabled = false;
        showQuestion();
      } else {
        endQuiz();
      }
    }

    function endQuiz() {
      saveScore(playerName, score);
      const scores = getScores();
      const best = scores.length ? scores[0] : null;

      quizCard.classList.add("hidden");
      resultCard.classList.remove("hidden");
      leaderboardCard.classList.remove("hidden");

      finalTitle.textContent = `Bravo ${playerName} !`;
      finalScore.textContent = `Ton score final est ${score} / 100.`;
      if (best && best.name === playerName && best.score === score) {
        winnerText.textContent = "Tu es en tete du classement local pour l'instant !";
      } else if (best) {
        winnerText.textContent = `Meilleur score actuel: ${best.name} avec ${best.score}/100.`;
      } else {
        winnerText.textContent = "Premier score enregistre !";
      }
      renderLeaderboard();
    }

    startBtn.addEventListener("click", startQuiz);
    restartBtn.addEventListener("click", () => {
      resultCard.classList.add("hidden");
      startCard.classList.remove("hidden");
      leaderboardCard.classList.remove("hidden");
      renderLeaderboard();
    });

    showAnswerBtn.addEventListener("click", () => {
      answerWrap.classList.remove("hidden");
      scoreButtons.classList.remove("hidden");
    });

    webBtn.addEventListener("click", () => {
      const q = questions[currentIndex];
      const query = encodeURIComponent(`${q.question} ${q.search}`);
      window.open(`https://www.google.com/search?q=${query}`, "_blank", "noopener,noreferrer");
    });

    goodBtn.addEventListener("click", () => markAnswer(true));
    badBtn.addEventListener("click", () => markAnswer(false));
    nextBtn.addEventListener("click", nextQuestion);

    renderLeaderboard();
  </script>
</body>
